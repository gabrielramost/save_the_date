<script>

function scrollToSaveDate() {

document
.getElementById("save-date")
.scrollIntoView({ behavior: "smooth" });

}

const weddingDate = new Date("May 30, 2026 00:00:00").getTime();

const countdown = setInterval(function(){

const now = new Date().getTime();

const distance = weddingDate - now;

const days = Math.floor(distance / (1000 * 60 * 60 * 24));
const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));

document.getElementById("days").innerHTML = days;
document.getElementById("hours").innerHTML = hours;
document.getElementById("minutes").innerHTML = minutes;

}, 1000);

 
</script>

<script>

const carousel = document.querySelector('.photo-carousel');

let autoScroll;
let isUserInteracting = false;

// SOLO MOBILE
const isMobile = window.matchMedia("(max-width: 768px)").matches;

if (isMobile){

function startAutoScroll(){

autoScroll = requestAnimationFrame(function scroll(){

if (!isUserInteracting){

carousel.scrollLeft += 0.4;

// loop infinito REAL
if (carousel.scrollLeft >= carousel.scrollWidth / 2){
carousel.scrollLeft = 0;
}

}

autoScroll = requestAnimationFrame(scroll);

});

}

function stopAutoScroll(){
isUserInteracting = true;
}

function resumeAutoScroll(){
isUserInteracting = false;
}

// iniciar
startAutoScroll();

// eventos touch (iPhone FIX)
carousel.addEventListener('touchstart', stopAutoScroll, {passive:true});
carousel.addEventListener('touchmove', stopAutoScroll, {passive:true});
carousel.addEventListener('touchend', resumeAutoScroll);

}

</script>
