<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gabriel & Akemi | Save the Date</title>

<link rel="stylesheet" href="css/style.css">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Cormorant+Garamond:wght@300;400;500&family=Great+Vibes&display=swap" rel="stylesheet">

</head>

<body>


<!-- HERO -->

<section class="hero">

<div class="hero-overlay">

<h1 class="names">
Gabriel & Akemi
</h1>

<p class="tagline">
We're getting married
</p>

<button class="enter-btn" onclick="scrollToSaveDate()">
Enter
</button>

</div>

<div class="scroll-indicator">
Scroll
<span>↓</span>
</div>

</section>



<!-- SAVE THE DATE -->

<section id="save-date" class="save-date reveal">

<div class="save-container">

<h2 class="title">
Save the Date
</h2>

<p class="date">
30 May 2026
</p>

<p class="location">
Lima, Perú
</p>

</div>

</section>



<script>

function scrollToSaveDate(){

document
.getElementById("save-date")
.scrollIntoView({behavior:"smooth"});

}


/* reveal animation */

const observer = new IntersectionObserver(entries => {

entries.forEach(entry => {

if(entry.isIntersecting){
entry.target.classList.add("show");
}

});

});

document.querySelectorAll(".reveal").forEach(el => observer.observe(el));

</script>


</body>
</html>
