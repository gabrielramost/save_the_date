<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gabriel & Akemi | Save the Date</title>

<link rel="stylesheet" href="css/style.css">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Great+Vibes&family=Cormorant+Garamond:wght@400;500&display=swap" rel="stylesheet">

</head>

<body>

<!-- HERO / WELCOME -->

<section class="hero">

<div class="hero-overlay">

<h1 class="names">
Gabriel & Akemi
</h1>

<p class="tagline">
¡Nos casamos!
</p>

<button class="enter-btn" onclick="scrollToSaveDate()">
Save the Date
</button>

</div>

<div class="scroll-indicator">
↓
</div>

</section>


<!-- SAVE THE DATE -->

<section id="save-date" class="save-date">

<div class="save-header">

<h2 class="save-title">
SAVE THE DATE
</h2>

<p class="save-date-text">
30 May 2026
</p>

<p class="save-location">
Lima, Perú
</p>

</div>

<div class="photo-carousel">

<button class="carousel-btn prev">‹</button>

<div class="carousel-track">

<img src="assets/img/photo1.jpeg" alt="" loading="lazy">
<img src="assets/img/photo2.jpeg" alt="" loading="lazy">
<img src="assets/img/photo3.jpeg" alt="" loading="lazy">
<img src="assets/img/photo4.jpeg" alt="" loading="lazy">

<img src="assets/img/photo1.jpeg" alt="" loading="lazy">
<img src="assets/img/photo2.jpeg" alt="" loading="lazy">
<img src="assets/img/photo3.jpeg" alt="" loading="lazy">
<img src="assets/img/photo4.jpeg" alt="" loading="lazy">

</div>

<button class="carousel-btn next">›</button>

</div>

</div>

</section>


<script>

function scrollToSaveDate() {

document
.getElementById("save-date")
.scrollIntoView({ behavior: "smooth" });

}

</script>

<script>

const track = document.querySelector('.carousel-track');

document.querySelector('.next').onclick = () => {
track.scrollBy({left:300, behavior:'smooth'});
}

document.querySelector('.prev').onclick = () => {
track.scrollBy({left:-300, behavior:'smooth'});
}

</script>

</body>
</html>
