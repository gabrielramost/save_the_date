<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gabriel & Akemi | Save the Date</title>

<link rel="stylesheet" href="css/style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Great+Vibes&family=Cormorant+Garamond:wght@400;500&display=swap" rel="stylesheet">
</head>

<body>

<!-- HERO / WELCOME -->

<section class="hero">

<div class="hero-overlay">

<h1 class="names">
Gabriel & Akemi
</h1>

<p class="tagline">
¡Nos casamos!
</p>

<button class="enter-btn" onclick="scrollToSaveDate()">
Save the Date
</button>

</div>

<div class="scroll-indicator">
↓
</div>

</section>


<!-- SAVE THE DATE -->

<section id="save-date" class="save-date">

<div class="save-header">

<h2 class="save-title">
SAVE THE DATE
</h2>

<p class="save-date-text">
30 de mayo de 2026
</p>

<p class="save-location">
Lima, Perú
</p>

<p class="save-message">
¡Tu invitación llegará pronto! Guarda la fecha y celebra con nosotros
</p>

<a class="calendar-btn"
href="https://calendar.google.com/calendar/render?action=TEMPLATE&text=Boda+Gabriel+y+Akemi&dates=20260530/20260531&details=Reserva+esta+fecha+para+nuestra+boda&location=Lima+Peru"
target="_blank">

Añadir al calendario

</a>

</div>

<div class="countdown">

<div class="count-item">
<span id="days">0</span>
<p>Días</p>
</div>

<div class="count-item">
<span id="hours">0</span>
<p>Horas</p>
</div>

<div class="count-item">
<span id="minutes">0</span>
<p>Min</p>
</div>
 
</div>

<div class="photo-carousel">

<div class="carousel-track">

<img src="assets/img/photo1.jpeg" alt="" loading="lazy">
<img src="assets/img/photo2.jpeg" alt="" loading="lazy">
<img src="assets/img/photo3.jpeg" alt="" loading="lazy">
<img src="assets/img/photo4.jpeg" alt="" loading="lazy">

<img src="assets/img/photo1.jpeg" alt="" loading="lazy">
<img src="assets/img/photo2.jpeg" alt="" loading="lazy">
<img src="assets/img/photo3.jpeg" alt="" loading="lazy">
<img src="assets/img/photo4.jpeg" alt="" loading="lazy">

<img src="assets/img/photo1.jpeg" alt="" loading="lazy">
<img src="assets/img/photo2.jpeg" alt="" loading="lazy">
<img src="assets/img/photo3.jpeg" alt="" loading="lazy">
<img src="assets/img/photo4.jpeg" alt="" loading="lazy">

</div>

</div>

</section>


<script>

function scrollToSaveDate() {

document
.getElementById("save-date")
.scrollIntoView({ behavior: "smooth" });

}

const weddingDate = new Date("May 30, 2026 00:00:00").getTime();

const countdown = setInterval(function(){

const now = new Date().getTime();

const distance = weddingDate - now;

const days = Math.floor(distance / (1000 * 60 * 60 * 24));
const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));

document.getElementById("days").innerHTML = days;
document.getElementById("hours").innerHTML = hours;
document.getElementById("minutes").innerHTML = minutes;

}, 1000);

 
</script>

</body>
</html>
