<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gabriel & Akemi | Save the Date</title>

<link rel="stylesheet" href="css/style.css">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Great+Vibes&family=Cormorant+Garamond:wght@400;500&display=swap" rel="stylesheet">

</head>

<body>

<!-- HERO / WELCOME -->

<section class="hero">

<div class="hero-overlay">

<h1 class="names">
Gabriel & Akemi
</h1>

<p class="tagline">
¡Nos casamos!
</p>

<button class="enter-btn" onclick="scrollToSaveDate()">
Save the Date
</button>

</div>

<div class="scroll-indicator">
↓
</div>

</section>


<!-- SAVE THE DATE -->

<section id="save-date" class="save-date">

<div class="save-container">

<h2 class="title">
Save the Date
</h2>

<p class="date">
October 10, 2026
</p>

<p class="location">
Lima, Perú
</p>

</div>

</section>


<script>

function scrollToSaveDate() {

document
.getElementById("save-date")
.scrollIntoView({ behavior: "smooth" });

}

</script>

</body>
</html>
